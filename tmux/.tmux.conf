##### ============================================================

##### -------------------------------
##### 1) 前缀键（最常用）
##### -------------------------------
# tmux 的所有快捷键，通常都以"前缀键 + 某个按键"触发。
# 这里把默认的 Control-b 改成了 Control-a（更顺手，很多人习惯这个）。
set -g prefix C-a
unbind C-b
bind C-a send-prefix

##### -------------------------------
##### 2) 基础行为
##### -------------------------------
# 窗口编号从 1 开始（新手更直观）
set -g base-index 1

# 面板编号也从 1 开始
setw -g pane-base-index 1

# 关闭某个窗口后自动重排编号，避免出现 1、3、7 这种空洞编号
set -g renumber-windows on

# 开启鼠标：可点击切换窗格、拖拽调大小、滚轮滚动历史
set -g mouse on

# 滚动历史保留行数（越大越能翻到更久之前的输出）
set -g history-limit 50000

# 减少 Esc 按键等待，能让 Vim/Neovim 在 tmux 里手感更跟手
set -sg escape-time 0

# 让 tmux 感知窗口焦点变化，部分工具会利用这个特性
set -g focus-events on

##### -------------------------------
##### 3) 终端颜色与兼容性
##### -------------------------------
# 使用 tmux-256color，提升颜色兼容性（尤其是 Neovim/主题）
set -g default-terminal "tmux-256color"

# 声明支持真彩（RGB）
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"

##### -------------------------------
##### 4) 分屏与重载配置
##### -------------------------------
# 水平分屏（左右），并继承当前面板路径
bind | split-window -h -c "#{pane_current_path}"

# 垂直分屏（上下），并继承当前面板路径
bind - split-window -v -c "#{pane_current_path}"

# 取消 tmux 默认分屏键（" 和 %），避免记忆冲突
unbind '"'
unbind %

# 快速重载配置：前缀 + r
# 你改完 ~/.tmux.conf 后不用重开 tmux，按这个就能立即生效。
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### -------------------------------
##### 5) 面板导航 / 调整大小
##### -------------------------------
# 复制模式使用 vi 键位（h j k l / v / y 等）
setw -g mode-keys vi

# 不按前缀，直接 Control+h/j/k/l 切换面板方向
# （Option+h/j/k/l 已被 AeroSpace 占用来切换 App 窗口，所以 tmux 用 Control）
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# 前缀 + H/J/K/L：按 5 个字符单位调整面板大小（可按住连发）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### -------------------------------
##### 6) 复制到 macOS 剪贴板
##### -------------------------------
# 进入 copy-mode 后：
# - 按 v 开始选择
# - 按 y 复制并写入系统剪贴板（pbcopy）
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

##### -------------------------------
##### 7) 状态栏（底部）
##### -------------------------------
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 140
set -g status-left "#[fg=green]#S "
# 右侧状态栏：
# - 会话恢复状态（continuum）
# - 当前路径 Git 分支（不在 Git 仓库则为空）
# - CPU/RAM/电池
# - 日期时间
set -g status-right "#{continuum_status} #(cd #{pane_current_path} 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null | awk '{print \"git:\"$0}') | #{cpu_percentage} #{ram_percentage} #{battery_icon} #{battery_percentage} #[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M "

##### -------------------------------
##### 8) TPM 插件管理器与常用插件
##### -------------------------------
# tpm：插件管理器（必备）
set -g @plugin "tmux-plugins/tpm"

# sensible：一组"合理默认值"
set -g @plugin "tmux-plugins/tmux-sensible"

# yank：增强复制行为
set -g @plugin "tmux-plugins/tmux-yank"

# resurrect：手动保存/恢复会话（窗口、面板、命令）
set -g @plugin "tmux-plugins/tmux-resurrect"

# continuum：定时自动保存 + tmux 启动时自动恢复
set -g @plugin "tmux-plugins/tmux-continuum"

# cpu：状态栏显示 CPU / RAM
set -g @plugin "tmux-plugins/tmux-cpu"

# battery：状态栏显示电池状态
set -g @plugin "tmux-plugins/tmux-battery"

# prefix-highlight：显示你是否按下了前缀键
set -g @plugin "tmux-plugins/tmux-prefix-highlight"

# catppuccin：更好看的主题
set -g @plugin "catppuccin/tmux"

##### -------------------------------
##### 9) 会话恢复策略（给新手的安全配置）
##### -------------------------------
# 保存面板内容，重启后也更容易还原现场
set -g @resurrect-capture-pane-contents "on"

# tmux 启动后自动尝试恢复
set -g @continuum-restore "on"

# 自动保存间隔（分钟）
set -g @continuum-save-interval "15"

##### -------------------------------
##### 10) 主题与插件参数
##### -------------------------------
# 主题风格：latte（浅色） / frappe / macchiato / mocha（深色）
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# CPU / RAM 显示样式（文字版，避免图标字体缺失）
set -g @cpu_low_icon "CPU"
set -g @cpu_medium_icon "CPU"
set -g @cpu_high_icon "CPU"
set -g @ram_low_icon "RAM"
set -g @ram_medium_icon "RAM"
set -g @ram_high_icon "RAM"

# 前缀高亮（按下 Control+a 后状态栏会有提示）
set -g @prefix_highlight_show_copy_mode "on"
set -g @prefix_highlight_prefix_prompt "PREFIX"

##### -------------------------------
##### 11) 常用操作速查（新手重点看这个）
##### -------------------------------
# 新建会话:            tmux new -s dev
# 进入会话:            tmux attach -t dev
# 列出会话:            tmux ls
# 退出会话(不关闭):    前缀 + d
#
# 新建窗口:            前缀 + c
# 下一个窗口:          前缀 + n
# 上一个窗口:          前缀 + p
# 重命名窗口:          前缀 + ,
#
# 左右分屏:            前缀 + |
# 上下分屏:            前缀 + -
# 关闭当前面板:        exit（在该面板执行）
#
# 进入复制模式:        前缀 + [
# 在复制模式选中复制:  v -> 移动光标 -> y
#
# 重载配置:            前缀 + r
# 安装插件:            前缀 + I（大写 i）
# 更新插件:            前缀 + U（大写 u）

##### -------------------------------
##### 12) 网络卡住时（你提到的"加源"）
##### -------------------------------
# 说明：
# - 清华源主要用于 Homebrew/软件包镜像，不是所有 GitHub 仓库都有对应镜像。
# - TPM 插件来自 GitHub，如果 git clone 卡住，优先检查代理/VPN。
#
# 可用排查命令：
#   git ls-remote https://github.com/tmux-plugins/tpm
#
# 若 GitHub 连接慢，可临时尝试镜像代理（非官方）：
#   git clone https://ghproxy.com/https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# 若你是通过 Homebrew 安装 tmux，本机已配置清华源可继续沿用（与 TPM 插件下载是两回事）。

##### -------------------------------
##### 13) 可继续升级的技巧（后续可选）
##### -------------------------------
# - 加模糊搜索：sainnhe/tmux-fzf（找窗口/会话更快）
# - 为不同项目设置不同 session 名称（前后端分开）
# - 若状态栏图标显示方块，可换 Nerd Font（如 JetBrainsMono Nerd Font）

##### -------------------------------
##### 14) TPM 启动（必须放在文件底部）
##### -------------------------------
# 做了"安全判断"：TPM 不存在时，不会报错。
if-shell "[ -f ~/.tmux/plugins/tpm/tpm ]" \
  "run '~/.tmux/plugins/tpm/tpm'"
